name: Build, Test, and Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      USE_TESTCONTAINERS: true
    strategy:
      matrix:
        dotnet: [ '6.0.x', '8.0.x', '9.0.x', '10.0.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Debug - List directory structure
      run: |
        echo "Root directory contents:"
        ls -la
        echo ""
        echo "LLMConnect directory contents:"
        ls -la ./LLMConnect || echo "LLMConnect folder does not exist"
        echo ""
        echo "Looking for .sln files:"
        find . -name "*.sln" -type f
      shell: bash

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}

    - name: Restore dependencies
      run: dotnet restore LLMConnect/LLMConnect/LLMConnect.csproj

    - name: Build
      run: dotnet build LLMConnect/LLMConnect/LLMConnect.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test LLMConnect/LLMConnect/LLMConnect.csproj --no-build --configuration Release --verbosity normal

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Display tag version
        run: echo "Tag version = ${GITHUB_REF#refs/tags/v}"

      - name: Pack NuGet package
        run: |
          dotnet pack LLMConnect/LLMConnect/LLMConnect.csproj \
            --configuration Release \
            --output ./nupkgs \
            -p:PackageVersion="${GITHUB_REF#refs/tags/v}" \
            -p:IncludeSymbols=false \
            -p:IncludeSource=false

      - name: List nupkg files
        run: ls -la ./nupkgs

      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api://NuGet');
            core.setOutput('token', token);

      - name: Push to NuGet.org
        env:
          NUGET_AUTH_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            if [ -f "$pkg" ]; then
              echo "Pushing $pkg"
              dotnet nuget push "$pkg" \
                --source "https://api.nuget.org/v3/index.json" \
                --api-key "$NUGET_AUTH_TOKEN" \
                --skip-duplicate
            else
              echo "No .nupkg files found"
              exit 1
            fi
          done
